<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    
    <br>
    <label>V1: </label>
    <input type="number" id="x1"/>
    <input type="number" id="y1"/>

    <br>
    <label>V2: </label>
    <input type="number" id="x2"/>
    <input type="number" id="y2"/>
    
    <br>
    <input type="button" value="Draw" onclick="handleDrawEvent()"/> 

    <br>
    <select id="op">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="mag">Magnitude</option>
        <option value="nor">Normalize</option>
        <option value="dot">Angle Between </option>
        <option value="cross">Area </option>
    </select>
    <br>
    <input type="number" id="sc"/>
    <br>
    <input type="button" value="Draw" onclick="handleDrawOperationEvent()"/> 
    
    <script src= "../lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>
  </body>
</html>
