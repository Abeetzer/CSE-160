<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <button type="button" id="green">Green</button>
    <button type="button" id="red">Red</button>
    <p>
     <button type="button" id="pb">Point</button>
     <button type="button" id="tb">Triangle</button>
     <button type="button" id="cb">Circle</button>
     
    </p>
     
    <p id = "stats">XXX</p>
    
    <p>
      Red <input type="range" min="0" max= "100" value="100" class="slider" id= "rs">
    </p>
    <p>
      Green <input type="range" min="0" max= "100" value="100" class="slider" id= "gs">    
    </p>
    <p>
      Blue <input type="range" min="0" max= "100" value="100" class="slider" id= "bs">  
    </p>

    <p>
      Size <input type="range" min="0" max= "100" value="0" class="slider" id= "ss">  
    </p>

    <p>
      Segment <input type="range" min="3" max= "100" value="0" class="slider" id= "se">  
    </p>

    <button type="button" id="clear">Clear</button>
    
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="Point.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="ColoredPoints.js"></script>
  </body>
</html>
